<script>
  /* ════════════════════════════════════════
     AUTH & API HELPER
  ════════════════════════════════════════ */
  const token = localStorage.getItem('access');
  if (!token) window.location = '/login/';

  const API = {
    headers: () => ({
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + localStorage.getItem('access'),
    }),
    get:   (url)       => fetch(url, { headers: API.headers() }),
    post:  (url, body) => fetch(url, { method: 'POST',   headers: API.headers(), body: JSON.stringify(body) }),
    patch: (url, body) => fetch(url, { method: 'PATCH',  headers: API.headers(), body: JSON.stringify(body) }),
    del:   (url)       => fetch(url, { method: 'DELETE', headers: API.headers() }),
  };

  /* ════════════════════════════════════════
     STATE
  ════════════════════════════════════════ */
  let currentUser  = null;
  let currentHouse = null;
  let houses       = [];

  /* ════════════════════════════════════════
     CLOCK
  ════════════════════════════════════════ */
  (function tick() {
    const n = new Date();
    document.getElementById('lt').textContent =
      n.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    setTimeout(tick, 1000);
  })();

  /* ════════════════════════════════════════
     NAVIGATION
  ════════════════════════════════════════ */
  function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.rail-item').forEach(i => i.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.querySelector(`.rail-item[data-page="${name}"]`)?.classList.add('active');

    if (name === 'plugs')    loadPlugs();
    if (name === 'energy')   loadEnergyPage('daily');
    if (name === 'members')  loadMembers();
    if (name === 'settings') loadSettings();
  }

  /* ════════════════════════════════════════
     USER POPUP
  ════════════════════════════════════════ */
  function toggleUserPopup() {
    document.getElementById('user-popup').classList.toggle('open');
  }

  function closeUserPopup() {
    document.getElementById('user-popup').classList.remove('open');
  }

  document.addEventListener('click', e => {
    const wrap = document.querySelector('.user-popup-wrap');
    if (wrap && !wrap.contains(e.target)) closeUserPopup();
  });

  /* ════════════════════════════════════════
     MODALS
  ════════════════════════════════════════ */
  function openModal(id) {
    document.getElementById(id).classList.add('open');
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('open');
    });
  });

  /* ════════════════════════════════════════
     LOGOUT
  ════════════════════════════════════════ */
  async function logout() {
    const refresh = localStorage.getItem('refresh');
    if (refresh) {
      await API.post('/auth/logout/', { refresh }).catch(() => {});
    }
    localStorage.clear();
    window.location = '/login/';
  }

  /* ════════════════════════════════════════
     LOAD USER
  ════════════════════════════════════════ */
  async function loadUser() {
    const res = await API.get('/auth/me/');
    if (!res.ok) { localStorage.clear(); window.location = '/login/'; return; }

    currentUser = await res.json();
    const initial = (currentUser.username || '?')[0].toUpperCase();

    document.getElementById('nav-avatar').textContent         = initial;
    document.getElementById('popup-avatar').textContent       = initial;
    document.getElementById('popup-name').textContent         = currentUser.username;
    document.getElementById('popup-email').textContent        = currentUser.email || '';
    document.getElementById('settings-avatar').textContent    = initial;
    document.getElementById('settings-username').textContent  = currentUser.username;
    document.getElementById('settings-email').textContent     = currentUser.email || '';
  }

  /* ════════════════════════════════════════
     HOUSES
  ════════════════════════════════════════ */
  async function loadHouses() {
    const res = await API.get('/api/house');
    const sel = document.getElementById('house-selector');

    if (!res.ok) {
      sel.innerHTML = '<option value="">Could not load houses</option>';
      return;
    }

    houses = await res.json();

    if (!houses.length) {
      sel.innerHTML = '<option value="">No houses — create one in Settings</option>';
      return;
    }

    sel.innerHTML = houses.map(h =>
      `<option value="${h.id}">${h.name || 'House ' + h.id}</option>`
    ).join('');

    currentHouse = houses[0];
    sel.value = currentHouse.id;
    onHouseChange();
  }

  function onHouseChange() {
    const sel = document.getElementById('house-selector');
    currentHouse = houses.find(h => String(h.id) === sel.value) || null;
    if (currentHouse) loadOverview();
  }

  /* ════════════════════════════════════════
     OVERVIEW
  ════════════════════════════════════════ */
  async function loadOverview() {
    if (!currentHouse) return;
    loadPlugsOverview();
    loadEnergySummary('daily');
  }

  async function loadPlugsOverview() {
    const res    = await API.get('/api/plugs');
    const listEl = document.getElementById('device-list');

    if (!res.ok) { renderEmptyDevices(listEl, 'Could not load plugs'); return; }

    const plugs   = await res.json();
    const active  = plugs.filter(p => p.status === 'on'  || p.is_on);
    const idle    = plugs.filter(p => p.status === 'idle' || (!p.is_on && p.online !== false));
    const offline = plugs.filter(p => p.status === 'offline' || p.online === false);

    document.getElementById('plugs-on').textContent    = active.length;
    document.getElementById('plugs-idle').textContent  = idle.length;
    document.getElementById('plugs-off').textContent   = offline.length;
    document.getElementById('plug-note').textContent   = plugs.length + ' plug(s) registered';
    document.getElementById('device-count').textContent = active.length + ' active';
    document.getElementById('alert-count').innerHTML   = offline.length + '<span class="unit"> offline</span>';
    document.getElementById('alert-note').textContent  = offline.length
      ? offline.map(p => p.name).join(', ')
      : 'All plugs online';

    if (!active.length) { renderEmptyDevices(listEl, 'No active devices'); return; }

    listEl.innerHTML = active.map(p => `
      <div class="list-item">
        <div class="lead-icon safe">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--md-success)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
        <div>
          <div class="item-head">${p.name || 'Plug ' + p.id}</div>
          <div class="item-sub">${p.location || p.room || '—'}</div>
        </div>
        <div class="m3-progress">
          <div class="prog-labels">
            <span>${p.current_power != null ? p.current_power + ' W' : '— W'}</span>
            <span class="safe-txt">Active</span>
          </div>
          <div class="prog-track">
            <div class="prog-fill safe" style="width:60%"></div>
          </div>
        </div>
        <span class="m3-badge safe">On</span>
        <button class="m3-switch on" onclick="togglePlug('${p.id}', this)"></button>
      </div>
    `).join('');
  }

  function renderEmptyDevices(el, msg) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--md-outline)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="6" y="2" width="12" height="6" rx="2"/>
            <path d="M4 8h16v2a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V8z"/>
            <path d="M12 14v8"/>
          </svg>
        </div>
        <div class="empty-title">${msg}</div>
        <div class="empty-sub">Add smart plugs to start monitoring.</div>
      </div>`;
  }

  async function loadEnergySummary(period) {
    document.querySelectorAll('#page-overview .seg-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.period === period);
    });

    if (!currentHouse) return;

    const chartEl = document.getElementById('energy-chart');
    const totalEl = document.getElementById('energy-total');
    const res     = await API.get(`/api/houses/${currentHouse.id}/energy/summary?period=${period}`);

    if (!res.ok) {
      chartEl.innerHTML = `<div class="empty-state" style="padding:24px 0;"><div class="empty-title">No energy data</div><div class="empty-sub">Energy data will appear once plugs are active.</div></div>`;
      totalEl.textContent = '— kWh';
      document.getElementById('energy-today').innerHTML = '—<span class="unit"> kWh</span>';
      document.getElementById('cost-today').innerHTML   = '—<span class="unit"> /day</span>';
      return;
    }

    const data = await res.json();
    renderEnergyChart(chartEl, totalEl, data);

    if (data.total_kwh != null)
      document.getElementById('energy-today').innerHTML = data.total_kwh.toFixed(1) + '<span class="unit"> kWh</span>';
    if (data.estimated_cost != null)
      document.getElementById('cost-today').innerHTML = '฿' + data.estimated_cost.toFixed(0) + '<span class="unit"> /day</span>';
  }

  function renderEnergyChart(chartEl, totalEl, data) {
    const items  = data.breakdown || data.devices || [];
    const total  = data.total_kwh ?? items.reduce((s, i) => s + (i.kwh || 0), 0);
    const colors = ['var(--md-primary)', 'var(--md-secondary)', 'var(--md-tertiary)', 'var(--md-error)', 'var(--md-success)', 'var(--md-outline)'];

    totalEl.textContent = total.toFixed(1) + ' kWh';

    if (!items.length) {
      chartEl.innerHTML = `<div class="empty-state" style="padding:24px 0;"><div class="empty-title">No breakdown data</div></div>`;
      return;
    }

    const max = Math.max(...items.map(i => i.kwh || 0), 0.01);
    chartEl.innerHTML = `<div class="bar-chart">` + items.map((item, idx) => `
      <div class="bar-row">
        <div class="bar-lr">
          <span>${item.name || item.device || 'Device ' + (idx + 1)}</span>
          <span class="bar-vl">${(item.kwh || 0).toFixed(2)} kWh</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${((item.kwh || 0) / max * 100).toFixed(1)}%;background:${colors[idx % colors.length]}"></div>
        </div>
      </div>
    `).join('') + `</div>`;
  }

  /* ════════════════════════════════════════
     PLUGS PAGE
  ════════════════════════════════════════ */
  async function loadPlugs() {
    const grid = document.getElementById('plugs-grid');
    const res  = await API.get('/api/plugs');

    if (!res.ok) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-title">Could not load plugs</div><div class="empty-sub">Check your connection and try again.</div></div>`;
      return;
    }

    const plugs = await res.json();

    if (!plugs.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--md-outline)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="6" y="2" width="12" height="6" rx="2"/>
              <path d="M4 8h16v2a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V8z"/>
              <path d="M12 14v8"/>
            </svg>
          </div>
          <div class="empty-title">No smart plugs</div>
          <div class="empty-sub">Register your first smart plug to start monitoring energy usage.</div>
          <button class="btn-tonal" style="margin-top:8px" onclick="openModal('modal-add-plug')">Register Plug</button>
        </div>`;
      return;
    }

    grid.innerHTML = plugs.map(p => {
      const isOn   = p.is_on || p.status === 'on';
      const online = p.online !== false;
      const dotCls = !online ? 'offline' : isOn ? 'online' : 'idle';
      const dotLbl = !online ? 'Offline'  : isOn ? 'On'     : 'Idle';
      return `
        <div class="plug-card m3-enter">
          <div class="plug-card-header">
            <div>
              <div class="plug-card-name">${p.name || 'Plug ' + p.id}</div>
              <div class="plug-card-loc">${p.location || p.room || '—'}</div>
            </div>
            <button class="m3-switch ${isOn ? 'on' : 'off'}" onclick="togglePlug('${p.id}', this)"></button>
          </div>
          <div class="plug-card-power">${p.current_power != null ? p.current_power : '—'}<span class="unit"> W</span></div>
          <div style="font-size:var(--type-body-sm);color:var(--md-on-surface-var);">
            <span class="plug-status-dot ${dotCls}"></span>${dotLbl}
          </div>
        </div>`;
    }).join('');
  }

  async function togglePlug(plugId, btn) {
    const isOn = btn.classList.contains('on');
    const res  = await API.post(`/api/plugs/${plugId}/control`, { action: isOn ? 'off' : 'on' });
    if (res.ok) {
      btn.classList.toggle('on');
      btn.classList.toggle('off');
    }
  }

  async function addPlug() {
    const name     = document.getElementById('new-plug-name').value.trim();
    const location = document.getElementById('new-plug-location').value.trim();
    const errEl    = document.getElementById('add-plug-error');
    errEl.textContent = '';

    if (!name) { errEl.textContent = 'Plug name is required.'; return; }

    const body = { name, location };
    if (currentHouse) body.house_id = currentHouse.id;

    const res  = await API.post('/api/plugs', body);
    const data = await res.json();

    if (res.ok) {
      closeModal('modal-add-plug');
      document.getElementById('new-plug-name').value     = '';
      document.getElementById('new-plug-location').value = '';
      loadPlugs();
    } else {
      errEl.textContent = data.error || data.detail || 'Failed to register plug.';
    }
  }

  /* ════════════════════════════════════════
     ENERGY PAGE
  ════════════════════════════════════════ */
  async function loadEnergyPage(period) {
    document.querySelectorAll('#page-energy .seg-btn').forEach(b => {
      b.classList.toggle('active', b.textContent.toLowerCase().startsWith(period === 'daily' ? 'daily' : 'monthly'));
    });

    if (!currentHouse) return;

    const chartEl  = document.getElementById('energy-page-chart');
    const totalEl  = document.getElementById('energy-page-total');
    const endpoint = period === 'monthly'
      ? `/api/houses/${currentHouse.id}/energy/monthly`
      : `/api/houses/${currentHouse.id}/energy/daily`;

    const res = await API.get(endpoint);

    if (!res.ok) {
      chartEl.innerHTML   = `<div class="empty-state"><div class="empty-title">No energy data</div><div class="empty-sub">Energy reports will appear once plugs are active.</div></div>`;
      totalEl.textContent = '— kWh';
      return;
    }

    renderEnergyChart(chartEl, totalEl, await res.json());
  }

  /* ════════════════════════════════════════
     MEMBERS PAGE
  ════════════════════════════════════════ */
  async function loadMembers() {
    if (!currentHouse) return;
    const wrap = document.getElementById('members-table-wrap');
    const res  = await API.get(`/api/houses/${currentHouse.id}/users`);

    if (!res.ok) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-title">Could not load members</div></div>`;
      return;
    }

    const members = await res.json();

    if (!members.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--md-outline)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div class="empty-title">No members</div><div class="empty-sub">Invite people to join this house.</div></div>`;
      return;
    }

    wrap.innerHTML = `
      <table class="members-table">
        <thead><tr><th>User</th><th>Email</th><th>Role</th><th></th></tr></thead>
        <tbody>
          ${members.map(m => `
            <tr>
              <td style="font-weight:500">${m.username || m.user?.username || '—'}</td>
              <td style="color:var(--md-on-surface-var)">${m.email || m.user?.email || '—'}</td>
              <td><span class="role-badge ${m.role}">${m.role}</span></td>
              <td>${m.role !== 'owner' ? `<button class="btn-text" style="color:var(--md-error);font-size:var(--type-label-md);" onclick="removeMember('${m.user_id || m.id}')">Remove</button>` : ''}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  async function inviteMember() {
    const email    = document.getElementById('invite-email').value.trim();
    const role     = document.getElementById('invite-role').value;
    const errEl    = document.getElementById('invite-error');
    const noticeEl = document.getElementById('invite-notice');
    errEl.textContent = noticeEl.textContent = '';

    if (!email)        { errEl.textContent = 'Email is required.'; return; }
    if (!currentHouse) { errEl.textContent = 'No house selected.'; return; }

    const res  = await API.post(`/api/houses/${currentHouse.id}/users/invite`, { email, role });
    const data = await res.json();

    if (res.ok) {
      noticeEl.textContent = data.message || 'Invitation sent.';
      document.getElementById('invite-email').value = '';
      loadMembers();
    } else {
      errEl.textContent = data.error || data.detail || 'Failed to send invite.';
    }
  }

  async function removeMember(userId) {
    if (!currentHouse) return;
    if (!confirm('Remove this member from the house?')) return;
    const res = await API.del(`/api/houses/${currentHouse.id}/users/${userId}`);
    if (res.ok) loadMembers();
  }

  /* ════════════════════════════════════════
     SETTINGS PAGE
  ════════════════════════════════════════ */
  function loadSettings() {
    if (currentHouse)
      document.getElementById('settings-house-name').value = currentHouse.name || '';
  }

  async function saveHouseName() {
    const name  = document.getElementById('settings-house-name').value.trim();
    const msgEl = document.getElementById('settings-house-msg');
    msgEl.textContent = '';

    if (!name || !currentHouse) return;

    const res  = await API.patch(`/api/house/${currentHouse.id}`, { name });
    const data = await res.json();

    if (res.ok) {
      currentHouse.name = name;
      msgEl.textContent = 'House name updated.';
      loadHouses();
    } else {
      msgEl.style.color = 'var(--md-error)';
      msgEl.textContent = data.error || 'Failed to update.';
    }
  }

  async function createHouse() {
    const name  = document.getElementById('new-house-name').value.trim();
    const errEl = document.getElementById('create-house-error');
    errEl.textContent = '';

    if (!name) { errEl.textContent = 'House name is required.'; return; }

    const res  = await API.post('/api/house', { name });
    const data = await res.json();

    if (res.ok) {
      closeModal('modal-create-house');
      document.getElementById('new-house-name').value = '';
      await loadHouses();
    } else {
      errEl.textContent = data.error || data.detail || 'Failed to create house.';
    }
  }

  /* ════════════════════════════════════════
     INIT
  ════════════════════════════════════════ */
  (async function init() {
    await loadUser();
    await loadHouses();
  })();
</script>
