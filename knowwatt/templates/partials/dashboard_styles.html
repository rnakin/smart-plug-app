<style>
  /* Rail items as divs (original mockup style) */
  .rail-item {
    background: none;
    border: none;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
  }

  /* ── Page visibility ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── User popup ── */
  .user-popup-wrap { position: relative; }

  .user-popup {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--md-surface-container-lowest);
    border: 1px solid var(--md-outline-var);
    border-radius: var(--shape-xl);
    box-shadow: var(--shadow-3);
    padding: 16px;
    min-width: 200px;
    z-index: 200;
    animation: m3Enter var(--duration-medium-2) var(--motion-emphasized-dec) both;
  }

  .user-popup.open { display: block; }

  .popup-user-info {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--md-outline-var);
    margin-bottom: 8px;
  }

  .popup-avatar {
    width: 40px;
    height: 40px;
    border-radius: var(--shape-full);
    background: linear-gradient(135deg, var(--md-primary), var(--md-tertiary));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 16px;
    color: white;
    flex-shrink: 0;
  }

  .popup-name  { font-size: var(--type-body-lg); font-weight: 600; color: var(--md-on-surface); }
  .popup-email { font-size: var(--type-body-sm); color: var(--md-on-surface-var); }

  .popup-menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 8px;
    border-radius: var(--shape-sm);
    cursor: pointer;
    font-size: var(--type-body-md);
    color: var(--md-on-surface);
    position: relative;
    overflow: hidden;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    font-family: 'Nunito', sans-serif;
  }

  .popup-menu-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--md-on-surface);
    opacity: 0;
    transition: opacity var(--duration-short-4);
  }

  .popup-menu-item:hover::before { opacity: 0.08; }
  .popup-menu-item.danger { color: var(--md-error); }
  .popup-menu-item.danger::before { background: var(--md-error); }

  /* ── House selector ── */
  .house-selector {
    padding: 0 16px;
    height: 36px;
    border-radius: var(--shape-full);
    border: 1px solid var(--md-outline-var);
    background: var(--md-surface-container-low);
    cursor: pointer;
    font-size: var(--type-body-md);
    font-family: 'Nunito', sans-serif;
    color: var(--md-on-surface);
    flex: 1;
    max-width: 240px;
  }

  /* ── Empty state ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    text-align: center;
    color: var(--md-on-surface-var);
    gap: 12px;
  }

  .empty-icon {
    width: 56px;
    height: 56px;
    border-radius: var(--shape-full);
    background: var(--md-surface-container-highest);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
  }

  .empty-title { font-size: var(--type-title-sm); font-weight: 600; color: var(--md-on-surface); }
  .empty-sub   { font-size: var(--type-body-sm); color: var(--md-on-surface-var); max-width: 280px; }

  /* ── Modal overlay ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--md-surface-container-lowest);
    border-radius: var(--shape-xl);
    box-shadow: var(--shadow-3);
    padding: 28px;
    width: 100%;
    max-width: 440px;
    animation: m3Enter var(--duration-medium-2) var(--motion-emphasized-dec) both;
  }

  .modal-title {
    font-size: var(--type-title-lg);
    font-weight: 600;
    color: var(--md-on-surface);
    margin-bottom: 20px;
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 24px;
  }

  /* ── Page header ── */
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .page-title {
    font-size: var(--type-headline-sm);
    font-weight: 400;
    color: var(--md-on-surface);
    letter-spacing: -0.3px;
  }

  /* ── Members table ── */
  .members-table { width: 100%; border-collapse: collapse; }

  .members-table th {
    text-align: left;
    font-size: var(--type-label-md);
    font-weight: 600;
    color: var(--md-on-surface-var);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 12px 16px;
    border-bottom: 1px solid var(--md-outline-var);
  }

  .members-table td {
    padding: 14px 16px;
    font-size: var(--type-body-md);
    border-bottom: 1px solid var(--md-outline-var);
  }

  .members-table tr:last-child td { border-bottom: none; }

  .role-badge {
    font-size: var(--type-label-sm);
    font-weight: 600;
    padding: 3px 10px;
    border-radius: var(--shape-full);
    text-transform: capitalize;
  }

  .role-badge.owner  { background: var(--md-primary-container); color: var(--md-on-primary-cont); }
  .role-badge.admin  { background: var(--md-secondary-cont);    color: var(--md-on-secondary-cont); }
  .role-badge.member { background: var(--md-surface-container-highest); color: var(--md-on-surface-var); }

  /* ── Settings ── */
  .settings-section {
    background: var(--md-surface-container-lowest);
    background-image: linear-gradient(var(--elev-1), var(--elev-1));
    border-radius: var(--shape-xl);
    box-shadow: var(--shadow-1);
    padding: 24px;
    margin-bottom: 16px;
  }

  .settings-section-title {
    font-size: var(--type-title-sm);
    font-weight: 600;
    color: var(--md-on-surface);
    margin-bottom: 16px;
  }

  /* ── Plug cards ── */
  .plugs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .plug-card {
    background: var(--md-surface-container-lowest);
    background-image: linear-gradient(var(--elev-1), var(--elev-1));
    border-radius: var(--shape-xl);
    box-shadow: var(--shadow-1);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .plug-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .plug-card-name { font-size: var(--type-title-sm); font-weight: 600; color: var(--md-on-surface); }
  .plug-card-loc  { font-size: var(--type-body-sm); color: var(--md-on-surface-var); margin-top: 2px; }

  .plug-card-power {
    font-family: 'Roboto Mono', monospace;
    font-size: var(--type-headline-sm);
    font-weight: 400;
    color: var(--md-primary);
    margin: 8px 0 4px;
  }

  .plug-card-power .unit { font-size: var(--type-label-lg); color: var(--md-on-surface-var); }

  .plug-status-dot {
    width: 10px;
    height: 10px;
    border-radius: var(--shape-full);
    display: inline-block;
    margin-right: 6px;
  }

  .plug-status-dot.online  { background: var(--md-success); }
  .plug-status-dot.offline { background: var(--md-error); }
  .plug-status-dot.idle    { background: var(--md-outline); }

  @media (max-width: 600px) {
    .page-header { flex-direction: column; align-items: flex-start; }
  }
</style>
