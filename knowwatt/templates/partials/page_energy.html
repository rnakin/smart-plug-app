<div class="page" id="page-energy">
  <div class="page-header">
    <h1 class="page-title">Energy Reports</h1>
    <div class="seg-group" style="margin-bottom:0;width:auto;">
      <button class="seg-btn active" onclick="loadEnergyPage('daily')">Daily</button>
      <button class="seg-btn"        onclick="loadEnergyPage('monthly')">Monthly</button>
    </div>
  </div>

  <div class="lower-grid" style="grid-template-columns:1fr;">
    <div class="energy-card">
      <div class="energy-head">
        <span class="list-title">Usage Breakdown</span>
      </div>
      <div class="energy-body">
        <div id="energy-page-chart">
          <div class="empty-state">
            <div class="empty-title">No energy data</div>
            <div class="empty-sub">Energy reports will appear once plugs are active and recording sessions.</div>
          </div>
        </div>
        <div class="m3-divider"></div>
        <div class="total-row">
          <span class="total-lbl">Total</span>
          <span class="total-val" id="energy-page-total">— kWh</span>
        </div>
      </div>
    </div>
  </div>
</div>
