<!-- ════ MODALS ════ -->

<!-- Add Plug -->
<div class="modal-overlay" id="modal-add-plug">
  <div class="modal">
    <div class="modal-title">Register Smart Plug</div>
    <div class="field-group">
      <div class="field">
        <label class="field-label">Plug Name</label>
        <input class="field-input" id="new-plug-name" placeholder="e.g. Kitchen Plug">
      </div>
      <div class="field">
        <label class="field-label">Location</label>
        <input class="field-input" id="new-plug-location" placeholder="e.g. Kitchen">
      </div>
    </div>
    <p class="msg-error" id="add-plug-error"></p>
    <div class="modal-actions">
      <button class="btn-text"   onclick="closeModal('modal-add-plug')">Cancel</button>
      <button class="btn-filled" onclick="addPlug()">Register</button>
    </div>
  </div>
</div>

<!-- Invite Member -->
<div class="modal-overlay" id="modal-invite">
  <div class="modal">
    <div class="modal-title">Invite Member</div>
    <div class="field-group">
      <div class="field">
        <label class="field-label">Email Address</label>
        <input class="field-input" id="invite-email" type="email" placeholder="member@email.com">
      </div>
      <div class="field">
        <label class="field-label">Role</label>
        <select class="field-input" id="invite-role" style="cursor:pointer;">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
          <option value="guest">Guest</option>
        </select>
      </div>
    </div>
    <p class="msg-error"  id="invite-error"></p>
    <p class="msg-notice" id="invite-notice"></p>
    <div class="modal-actions">
      <button class="btn-text"   onclick="closeModal('modal-invite')">Cancel</button>
      <button class="btn-filled" onclick="inviteMember()">Send Invite</button>
    </div>
  </div>
</div>

<!-- Create House -->
<div class="modal-overlay" id="modal-create-house">
  <div class="modal">
    <div class="modal-title">Create New House</div>
    <div class="field-group">
      <div class="field">
        <label class="field-label">House Name</label>
        <input class="field-input" id="new-house-name" placeholder="e.g. My Apartment">
      </div>
      <div class="field">
        <label class="field-label">Address</label>
        <input class="field-input" id="new-house-address" placeholder="e.g. 123 Main Street">
      </div>
    </div>
    <p class="msg-error" id="create-house-error"></p>
    <div class="modal-actions">
      <button class="btn-text"   onclick="closeModal('modal-create-house')">Cancel</button>
      <button class="btn-filled" onclick="createHouse()">Create</button>
    </div>
  </div>
</div>
