{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — KnowWatt</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card m3-enter" id="verify-card">

    <!-- Loading state -->
    <div id="loading-view" style="text-align:center;">
      <div class="spinner" style="width:40px;height:40px;border:3px solid var(--md-outline);border-top-color:var(--md-primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px;"></div>
      <p class="auth-subhead">Verifying your email...</p>
    </div>

    <!-- Success state -->
    <div id="success-view" style="display:none; text-align:center;">
      <div style="width:64px;height:64px;border-radius:var(--shape-full);background:var(--md-primary-container);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--md-primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h1 class="auth-headline" style="margin-bottom:8px;">Email verified!</h1>
      <p class="auth-subhead" style="margin-bottom:24px;">
        Your account is now active. You can sign in to access your dashboard.
      </p>
      <a href="/login/" class="btn-filled btn-full">Sign In</a>
    </div>

    <!-- Error state -->
    <div id="error-view" style="display:none; text-align:center;">
      <div style="width:64px;height:64px;border-radius:var(--shape-full);background:var(--md-error-container);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--md-error)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <h1 class="auth-headline" style="margin-bottom:8px;">Verification failed</h1>
      <p class="auth-subhead" style="margin-bottom:24px;" id="error-msg">
        The verification link is invalid or has expired.
      </p>
      <a href="/login/" class="btn-filled btn-full">Back to Sign In</a>
    </div>

  </div>
</div>

<style>
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>

<script>
async function verifyEmail() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    showError('No verification token provided.');
    return;
  }

  try {
    const res = await fetch('/auth/verify-email/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });

    const data = await res.json();

    if (res.ok) {
      showSuccess();
    } else {
      showError(data.error || 'Verification failed. The link may be expired or invalid.');
    }
  } catch (e) {
    showError('An error occurred. Please try again.');
  }
}

function showSuccess() {
  document.getElementById('loading-view').style.display = 'none';
  document.getElementById('success-view').style.display = 'block';
}

function showError(msg) {
  document.getElementById('loading-view').style.display = 'none';
  document.getElementById('error-view').style.display = 'block';
  document.getElementById('error-msg').textContent = msg;
}

// Run on page load
verifyEmail();
</script>
</body>
</html>
