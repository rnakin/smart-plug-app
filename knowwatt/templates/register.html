{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — KnowWatt</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card m3-enter" id="register-card">

    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--md-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <span class="auth-logo-name">KnowWatt</span>
    </div>

    <!-- ── Registration form ── -->
    <div id="form-view">
      <h1 class="auth-headline">Create account</h1>
      <p class="auth-subhead">Start monitoring your energy usage</p>

      <div class="field-group">
        <div class="field">
          <label class="field-label" for="username">Username</label>
          <input class="field-input" id="username" type="text" placeholder="Choose a username" autocomplete="username">
        </div>
        <div class="field">
          <label class="field-label" for="email">Email</label>
          <input class="field-input" id="email" type="email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label class="field-label" for="password">Password</label>
          <input class="field-input" id="password" type="password" placeholder="Create a password" autocomplete="new-password">
        </div>
      </div>

      <p class="msg-error" id="error"></p>

      <button class="btn-filled btn-full" onclick="register()">Create Account</button>

      <div class="auth-footer">
        Already have an account? <a href="/login/">Sign in</a>
      </div>
    </div>

    <!-- ── Check email state (shown after successful registration) ── -->
    <div id="success-view" style="display:none; text-align:center;">
      <div style="width:64px;height:64px;border-radius:var(--shape-full);background:var(--md-secondary-cont);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--md-secondary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <h1 class="auth-headline" style="margin-bottom:8px;">Check your email</h1>
      <p class="auth-subhead" style="margin-bottom:0;">
        We sent a verification link to <strong id="sent-email"></strong>.<br>
        Click the link to activate your account. <br>
        if you don't get the link you can <a href="/auth/resend-verification/">resend</a>
      </p>
      <div class="auth-footer" style="margin-top:24px;">
        <a href="/login/">Back to sign in</a>

      </div>
    </div>

  </div>
</div>

<script>
  async function register() {
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorEl  = document.getElementById('error');

    errorEl.textContent = '';

    if (!username || !email || !password) {
      errorEl.textContent = 'All fields are required.';
      return;
    }

    const res  = await fetch('/auth/register/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();

    if (res.ok) {
      // Show "check your email" state
      document.getElementById('sent-email').textContent = email;
      document.getElementById('form-view').style.display    = 'none';
      document.getElementById('success-view').style.display = 'block';
    } else {
      errorEl.textContent = data.error || JSON.stringify(data);
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') register();
  });
</script>
</body>
</html>
