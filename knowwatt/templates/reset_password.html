{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — KnowWatt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/home/home.css' %}">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: auto; }
    .auth-wrap { width: 100%; max-width: 400px; padding: 24px 16px; }
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 36px 32px;
      animation: fadeUp .4s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .auth-logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .auth-logo-icon {
      width: 36px; height: 36px;
      background: var(--accent-dim);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .auth-logo-name { font-size: 16px; font-weight: 700; color: var(--text); }
    .auth-headline { font-size: 22px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 4px; }
    .auth-subhead  { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
    .field-group   { display: flex; flex-direction: column; gap: 14px; margin-bottom: 8px; }
    .field label   { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .4px; }
    .field input {
      width: 100%; padding: 11px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      font-family: 'DM Sans', sans-serif; outline: none;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
    .field input::placeholder { color: var(--text3); }
    .msg-error  { font-size: 12px; color: var(--danger); min-height: 18px; margin: 4px 0; }
    .msg-notice { font-size: 12px; color: var(--accent); min-height: 18px; margin: 4px 0; }
    .btn-primary {
      width: 100%; padding: 12px;
      background: var(--accent); color: #000;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer; margin-top: 4px;
    }
    .btn-primary:hover { filter: brightness(1.08); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .auth-footer { margin-top: 18px; text-align: center; font-size: 13px; color: var(--text2); }
    .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <span class="auth-logo-name">KnowWatt</span>
    </div>

    <h1 class="auth-headline">New password</h1>
    <p class="auth-subhead">Choose a strong password for your account</p>

    <div class="field-group">
      <div class="field">
        <label for="password">New password</label>
        <input id="password" type="password" placeholder="Enter new password" autocomplete="new-password">
      </div>
      <div class="field">
        <label for="confirm">Confirm password</label>
        <input id="confirm" type="password" placeholder="Confirm new password" autocomplete="new-password">
      </div>
    </div>

    <p class="msg-error"  id="error"></p>
    <p class="msg-notice" id="notice"></p>

    <button class="btn-primary" id="submit-btn" onclick="resetPassword()">Set New Password</button>

    <div class="auth-footer">
      <a href="/login/">← Back to sign in</a>
    </div>

  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (!token) {
    document.getElementById('error').textContent = 'Invalid or missing reset token.';
    document.getElementById('submit-btn').disabled = true;
  }

  async function resetPassword() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const errorEl  = document.getElementById('error');
    const noticeEl = document.getElementById('notice');
    errorEl.textContent  = '';
    noticeEl.textContent = '';

    if (!password) { errorEl.textContent = 'Password is required.'; return; }
    if (password !== confirm) { errorEl.textContent = 'Passwords do not match.'; return; }

    const res  = await fetch('/auth/reset-password/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    const data = await res.json();

    if (res.ok) {
      noticeEl.textContent = data.message || 'Password reset successful. Redirecting…';
      setTimeout(() => { window.location = '/login/'; }, 2000);
    } else {
      errorEl.textContent = data.error || 'Failed to reset password. The link may have expired.';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') resetPassword(); });
</script>
</body>
</html>
