<!DOCTYPE html>
<html>
<head><title>Reset Password</title></head>
<body>
  <h2>Reset Password</h2>
  <input id="password" type="password" placeholder="New password" /><br><br>
  <input id="confirm" type="password" placeholder="Confirm new password" /><br><br>
  <button onclick="resetPassword()">Reset Password</button>
  <p id="error" style="color:red"></p>
  <p id="notice" style="color:green"></p>

  <script>
    // Extract token from URL query string
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    if (!token) {
      document.getElementById('error').textContent = 'Invalid or missing reset token.';
    }

    async function resetPassword() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (!password) {
        document.getElementById('error').textContent = 'Password is required.';
        return;
      }

      if (password !== confirm) {
        document.getElementById('error').textContent = 'Passwords do not match.';
        return;
      }

      const res = await fetch('/auth/reset-password/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password })
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById('error').textContent = '';
        document.getElementById('notice').textContent = data.message || 'Password reset successful. You can now login.';
        setTimeout(() => { window.location = '/login/'; }, 2000);
      } else {
        document.getElementById('notice').textContent = '';
        document.getElementById('error').textContent = data.error || 'Failed to reset password.';
      }
    }
  </script>
</body>
</html>
