{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — KnowWatt</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card m3-enter">

    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--md-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <span class="auth-logo-name">KnowWatt</span>
    </div>

    <h1 class="auth-headline">New password</h1>
    <p class="auth-subhead">Choose a strong password for your account</p>

    <div class="field-group">
      <div class="field">
        <label class="field-label" for="password">New password</label>
        <input class="field-input" id="password" type="password" placeholder="Enter new password" autocomplete="new-password">
      </div>
      <div class="field">
        <label class="field-label" for="confirm">Confirm password</label>
        <input class="field-input" id="confirm" type="password" placeholder="Confirm new password" autocomplete="new-password">
      </div>
    </div>

    <p class="msg-error"  id="error"></p>
    <p class="msg-notice" id="notice"></p>

    <button class="btn-filled btn-full" id="submit-btn" onclick="resetPassword()">Set New Password</button>

    <div class="auth-footer">
      <a href="/login/">← Back to sign in</a>
    </div>

  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (!token) {
    document.getElementById('error').textContent = 'Invalid or missing reset token.';
    document.getElementById('submit-btn').disabled = true;
  }

  async function resetPassword() {
    const password  = document.getElementById('password').value;
    const confirm   = document.getElementById('confirm').value;
    const errorEl   = document.getElementById('error');
    const noticeEl  = document.getElementById('notice');

    errorEl.textContent  = '';
    noticeEl.textContent = '';

    if (!password) {
      errorEl.textContent = 'Password is required.';
      return;
    }

    if (password !== confirm) {
      errorEl.textContent = 'Passwords do not match.';
      return;
    }

    const res = await fetch('/auth/reset-password/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });

    const data = await res.json();

    if (res.ok) {
      noticeEl.textContent = data.message || 'Password reset successful. Redirecting to login…';
      setTimeout(() => { window.location = '/login/'; }, 2000);
    } else {
      errorEl.textContent = data.error || 'Failed to reset password. The link may have expired.';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') resetPassword();
  });
</script>
</body>
</html>
