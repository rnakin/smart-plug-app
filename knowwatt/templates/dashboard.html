{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — KnowWatt</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="app">

  <!-- ── NAVIGATION RAIL ── -->
  <nav class="nav-rail">
    <button class="rail-fab" title="Home">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--md-on-primary-cont)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </button>

    <div class="rail-items">
      <a class="rail-item active" href="/dashboard/">
        <div class="rail-indicator">
          <svg class="rail-icon" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
          </svg>
        </div>
        <span class="rail-label">Overview</span>
      </a>
      <a class="rail-item" href="#">
        <div class="rail-indicator">
          <svg class="rail-icon" viewBox="0 0 24 24">
            <rect x="6" y="2" width="12" height="6" rx="2"/>
            <path d="M4 8h16v2a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V8z"/>
            <path d="M12 14v8"/>
          </svg>
        </div>
        <span class="rail-label">Devices</span>
      </a>
      <a class="rail-item" href="#">
        <div class="rail-indicator">
          <svg class="rail-icon" viewBox="0 0 24 24">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
        </div>
        <span class="rail-label">Energy</span>
      </a>
      <a class="rail-item" href="#">
        <div class="rail-indicator">
          <svg class="rail-icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </div>
        <span class="rail-label">Settings</span>
      </a>
    </div>

    <div class="rail-bottom">
      <div class="rail-avatar" id="nav-avatar" title="Logout" onclick="logout()">?</div>
    </div>
  </nav>

  <!-- ── TOP APP BAR ── -->
  <header class="top-bar">
    <div class="top-bar-title">Home Overview</div>
    <div class="top-bar-actions">
      <span class="live-clock" id="lt"></span>
      <button class="icon-btn" title="Notifications">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="n-badge" id="notif-badge" style="display:none">0</span>
      </button>
    </div>
  </header>

  <!-- ── CONTENT ── -->
  <main class="content">

    <!-- STAT CARDS -->
    <div class="dash-grid">
      <div class="stat-card filled m3-enter d1">
        <div class="card-label">Plug Status</div>
        <div class="plug-row">
          <div class="p-item"><span class="p-num g" id="plugs-on">—</span><span class="p-lbl">Active</span></div>
          <div class="p-item"><span class="p-num s" id="plugs-idle">—</span><span class="p-lbl">Idle</span></div>
          <div class="p-item"><span class="p-num r" id="plugs-off">—</span><span class="p-lbl">Offline</span></div>
        </div>
        <div class="card-support nt" id="plug-note">Loading…</div>
      </div>

      <div class="stat-card filled-sec m3-enter d2">
        <div class="card-label">Energy Today</div>
        <div class="card-display" id="energy-today">—<span class="unit"> kWh</span></div>
        <div class="card-support" id="energy-delta">—</div>
      </div>

      <div class="stat-card filled-ter m3-enter d3">
        <div class="card-label">Est. Cost</div>
        <div class="card-display" id="cost-today">—<span class="unit"> /day</span></div>
        <div class="card-support dn" id="cost-note">—</div>
      </div>

      <div class="stat-card filled-err m3-enter d4">
        <div class="card-label">Alerts</div>
        <div class="card-display" id="alert-count">0<span class="unit"> items</span></div>
        <div class="card-support up" id="alert-note">All clear</div>
      </div>
    </div>

    <!-- LOWER GRID -->
    <div class="lower-grid">

      <!-- DEVICE LIST -->
      <div class="list-card m3-enter d5">
        <div class="list-head">
          <span class="list-title">Active Devices</span>
          <span class="list-meta" id="device-count">0 devices</span>
        </div>
        <div id="device-list">
          <!-- Populated by JS -->
          <div style="padding:32px 24px; color:var(--md-on-surface-var); font-size:var(--type-body-md);">
            Loading devices…
          </div>
        </div>
      </div>

      <!-- ENERGY BREAKDOWN -->
      <div class="energy-card m3-enter d6">
        <div class="energy-head">
          <span class="list-title">Energy Usage</span>
        </div>
        <div class="energy-body">
          <div class="seg-group">
            <button class="seg-btn active" data-period="day">Today</button>
            <button class="seg-btn" data-period="week">Week</button>
            <button class="seg-btn" data-period="month">Month</button>
          </div>

          <div class="bar-chart" id="energy-chart">
            <!-- Populated by JS -->
          </div>

          <div class="m3-divider"></div>
          <div class="total-row">
            <span class="total-lbl">Total</span>
            <span class="total-val" id="energy-total">— kWh</span>
          </div>
        </div>
      </div>

    </div>
  </main>
</div>

<script>
  const token = localStorage.getItem('access');
  if (!token) window.location = '/login/';

  // ── Live clock ──
  (function tick() {
    const n = new Date();
    document.getElementById('lt').textContent =
      n.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    setTimeout(tick, 1000);
  })();

  // ── Segmented buttons ──
  document.querySelectorAll('.seg-group').forEach(g => {
    g.querySelectorAll('.seg-btn').forEach(b => {
      b.addEventListener('click', () => {
        g.querySelectorAll('.seg-btn').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      });
    });
  });

  // ── Load user info ──
  async function loadUser() {
    const res = await fetch('/auth/me/', {
      headers: { 'Authorization': 'Bearer ' + token }
    });

    if (res.ok) {
      const data = await res.json();
      const initial = (data.username || '?')[0].toUpperCase();
      document.getElementById('nav-avatar').textContent = initial;
      document.getElementById('nav-avatar').title = data.username + ' — click to logout';
    } else {
      localStorage.clear();
      window.location = '/login/';
    }
  }

  // ── Logout ──
  async function logout() {
    const refresh = localStorage.getItem('refresh');
    if (refresh) {
      await fetch('/auth/logout/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ refresh })
      });
    }
    localStorage.clear();
    window.location = '/login/';
  }

  // ── Placeholder device data (replace with real API calls) ──
  const mockDevices = [
    { name: 'Iron',       location: 'Bedroom plug',    status: 'err',  badge: 'Overtime',  time: '45 min', note: '+15 min over', pct: 100, on: true },
    { name: 'Air Fryer',  location: 'Kitchen plug',    status: 'warn', badge: 'Almost',    time: '28 / 30 min', note: '2 min left', pct: 93, on: true },
    { name: 'Fan',        location: 'Living room plug', status: 'safe', badge: 'Normal',   time: '2h 15min', note: 'Safe', pct: 30, on: true },
    { name: 'Unknown',    location: 'Bedroom 2 plug',  status: 'unk',  badge: null,        time: '15 min', note: '', pct: 20, on: true },
  ];

  const mockEnergy = [
    { label: 'Iron',         kwh: 3.2, pct: 100,  color: 'var(--md-error)' },
    { label: 'Air Fryer',    kwh: 2.8, pct: 87.5, color: 'var(--md-tertiary)' },
    { label: 'Fan',          kwh: 2.1, pct: 65.6, color: 'var(--md-success)' },
    { label: 'Washing M.',   kwh: 1.5, pct: 46.9, color: 'var(--md-primary)' },
    { label: 'TV',           kwh: 1.2, pct: 37.5, color: 'var(--md-secondary)' },
    { label: 'Other',        kwh: 1.7, pct: 53.1, color: 'var(--md-outline-var)' },
  ];

  function renderDevices() {
    const list = document.getElementById('device-list');
    const active = mockDevices.filter(d => d.on);
    document.getElementById('device-count').textContent = active.length + ' device' + (active.length !== 1 ? 's' : '');

    list.innerHTML = active.map(d => `
      <div class="list-item">
        <div class="lead-icon ${d.status}">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${iconColor(d.status)}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </div>
        <div>
          <div class="item-head">${d.name}</div>
          <div class="item-sub">${d.location}</div>
        </div>
        <div class="m3-progress">
          <div class="prog-labels">
            <span>${d.time}</span>
            <span class="${d.status}-txt">${d.note}</span>
          </div>
          <div class="prog-track">
            <div class="prog-fill ${d.status}" style="width:${d.pct}%"></div>
          </div>
        </div>
        ${d.badge ? `<span class="m3-badge ${d.status}">${d.badge}</span>` : `<button class="btn-tonal" style="padding:0 12px;height:32px;">Name it</button>`}
        <button class="m3-switch ${d.on ? 'on' : 'off'}" onclick="this.classList.toggle('on');this.classList.toggle('off')"></button>
      </div>
    `).join('');
  }

  function iconColor(status) {
    const map = {
      err: 'var(--md-error)',
      warn: 'var(--md-tertiary)',
      safe: 'var(--md-success)',
      unk: 'var(--md-outline)',
    };
    return map[status] || 'var(--md-on-surface-var)';
  }

  function renderEnergy() {
    const chart = document.getElementById('energy-chart');
    const total = mockEnergy.reduce((s, e) => s + e.kwh, 0).toFixed(1);
    document.getElementById('energy-total').textContent = total + ' kWh';

    chart.innerHTML = mockEnergy.map(e => `
      <div class="bar-row">
        <div class="bar-lr">
          <span>${e.label}</span>
          <span class="bar-vl">${e.kwh} kWh</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${e.pct}%;background:${e.color}"></div>
        </div>
      </div>
    `).join('');
  }

  function renderStats() {
    document.getElementById('plugs-on').textContent   = mockDevices.filter(d => d.on && d.status !== 'unk').length;
    document.getElementById('plugs-idle').textContent = 2;
    document.getElementById('plugs-off').textContent  = 1;
    document.getElementById('plug-note').textContent  = 'Kitchen plug just came online';
    document.getElementById('energy-today').innerHTML = '12.5<span class="unit"> kWh</span>';
    document.getElementById('energy-delta').className = 'card-support up';
    document.getElementById('energy-delta').textContent = '↑ +8% vs yesterday';
    document.getElementById('cost-today').innerHTML   = '฿45<span class="unit"> /day</span>';
    document.getElementById('cost-note').textContent  = '↓ 12% cheaper than last week';
    document.getElementById('alert-count').innerHTML  = '2<span class="unit"> items</span>';
    document.getElementById('alert-note').textContent = 'Iron + Air Fryer';
  }

  loadUser();
  renderStats();
  renderDevices();
  renderEnergy();
</script>
</body>
</html>
