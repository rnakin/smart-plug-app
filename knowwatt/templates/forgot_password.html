{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — KnowWatt</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card m3-enter">

    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--md-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </div>
      <span class="auth-logo-name">KnowWatt</span>
    </div>

    <h1 class="auth-headline">Reset password</h1>
    <p class="auth-subhead">Enter your email and we'll send you a reset link</p>

    <div class="field-group">
      <div class="field">
        <label class="field-label" for="email">Email address</label>
        <input class="field-input" id="email" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
    </div>

    <p class="msg-error"  id="error"></p>
    <p class="msg-notice" id="notice"></p>

    <button class="btn-filled btn-full" onclick="sendReset()">Send Reset Link</button>

    <div class="auth-footer">
      <a href="/login/">← Back to sign in</a>
    </div>

  </div>
</div>

<script>
  if (localStorage.getItem('access')) window.location = '/dashboard/';

  async function sendReset() {
    const email   = document.getElementById('email').value;
    const errorEl  = document.getElementById('error');
    const noticeEl = document.getElementById('notice');

    errorEl.textContent  = '';
    noticeEl.textContent = '';

    const res = await fetch('/auth/forgot-password/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (res.ok) {
      noticeEl.textContent = data.message || 'If that email exists, a reset link has been sent.';
    } else {
      errorEl.textContent = data.error || 'Something went wrong. Please try again.';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') sendReset();
  });
</script>
</body>
</html>
